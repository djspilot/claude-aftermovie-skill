<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aftermovie — pick your clips</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="topbar">
    <h1 class="title">Aftermovie — pick your clips</h1>
    <div class="toolbar" role="toolbar" aria-label="Render controls">
      <label class="ctrl">
        <span>Length</span>
        <input id="length" type="number" min="10" max="600" step="5" value="90" aria-label="Target length in seconds">
        <span class="suffix">s</span>
      </label>
      <label class="ctrl">
        <span>Pace</span>
        <select id="pace" aria-label="Pace">
          <option value="auto" selected>auto</option>
          <option value="slow">slow</option>
          <option value="medium">medium</option>
          <option value="fast">fast</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Look</span>
        <select id="lut" aria-label="LUT">
          <option value="">default</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Theme</span>
        <select id="theme" aria-label="Theme">
          <option value="">custom</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Transitions</span>
        <select id="transitions" aria-label="Transitions">
          <option value="soft" selected>soft</option>
          <option value="auto">auto</option>
          <option value="cut">cut</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Audio</span>
        <select id="audio-mix" aria-label="Audio mix">
          <option value="ducked" selected>ducked</option>
          <option value="music_only">music only</option>
          <option value="clip_only">clip only</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Aspect</span>
        <select id="aspect" aria-label="Aspect ratio">
          <option value="16:9" selected>16:9</option>
          <option value="9:16">9:16</option>
          <option value="1:1">1:1</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Reuse</span>
        <input id="source-cap" type="number" min="1" max="5" step="1" value="1" aria-label="Max uses per source">
      </label>
      <label class="check">
        <input id="speed-ramp" type="checkbox" checked>
        <span>Speed ramps</span>
      </label>
      <label class="check">
        <input id="reframe" type="checkbox" checked>
        <span>Reframe</span>
      </label>
      <label class="check">
        <input id="keep-bursts" type="checkbox" checked>
        <span>Keep nearby</span>
      </label>
      <button id="select-all" class="btn ghost" type="button">Select all</button>
      <button id="deselect-all" class="btn ghost" type="button">Deselect all</button>
      <span id="counter" class="counter" aria-live="polite">0 of 0 selected</span>
      <button id="render-preview-btn" class="btn secondary" type="button" title="Quarter-res, no LUT, no reframe — for fast iteration">⚡ Render Preview</button>
      <button id="render" class="btn primary" type="button">▶ Render Final</button>
    </div>
  </header>

  <main>
    <div id="status" class="status" role="status" aria-live="polite">Loading sources…</div>
    <div id="preview-status" class="preview-status hidden" aria-live="polite">
      <span id="preview-badge" class="preview-badge">Preview</span>
      <span id="preview-message" class="preview-message"></span>
      <span id="cache-indicator" class="cache-indicator hidden" title="Reused cached analyze data">Reuse analysis</span>
    </div>
    <div id="grid" class="grid" aria-label="Clip thumbnails"></div>

    <section id="plan-panel" class="plan-panel hidden" aria-label="Plan timeline">
      <div class="plan-header">
        <h2 class="plan-title">Plan timeline</h2>
        <span id="plan-meta" class="plan-meta" aria-live="polite"></span>
      </div>
      <div id="plan-empty" class="plan-empty hidden">Render once to see the plan.</div>
      <div id="plan-timeline" class="plan-timeline" role="list" aria-label="Plan entries"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Rendering…</h2>
      <div id="modal-state" class="modal-state">starting…</div>
      <pre id="modal-log" class="modal-log" aria-label="Render log"></pre>
      <div id="modal-result" class="modal-result hidden">
        <p>Output:</p>
        <code id="modal-path" class="path"></code>
        <div class="modal-actions">
          <button id="copy-path" class="btn ghost" type="button">Copy path</button>
          <a id="reveal-link" class="btn ghost" href="#" target="_blank" rel="noopener">Reveal in Finder</a>
        </div>
      </div>
      <div class="modal-actions modal-close-row">
        <button id="modal-close" class="btn ghost" type="button">Close</button>
      </div>
    </div>
  </div>

  <template id="cell-template">
    <div class="cell selected" tabindex="0" role="button" aria-pressed="true">
      <div class="thumb-wrap">
        <img class="thumb" alt="" loading="lazy">
        <span class="badge"></span>
        <span class="x-overlay" aria-hidden="true">✕</span>
      </div>
      <div class="name" title=""></div>
    </div>
  </template>

  <template id="plan-tile-template">
    <div class="plan-tile" role="listitem">
      <div class="plan-thumb-wrap">
        <img class="plan-thumb" alt="" loading="lazy">
        <span class="plan-transition hidden"></span>
        <span class="plan-duration"></span>
      </div>
      <div class="plan-name" title=""></div>
      <div class="plan-reasons"></div>
      <div class="plan-audio hidden" aria-label="Audio interest">
        <span class="plan-audio-bar"></span>
      </div>
    </div>
  </template>

  <script src="app.js?v=6" defer></script>
</body>
</html>
